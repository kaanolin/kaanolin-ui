name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://npm.pkg.github.com"
          scope: "@kaanolin"

      - run: npm ci

      - name: Bump version
        id: bump
        run: |
          cd packages/react
          npm version ${{ inputs.version }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release branch and PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/v${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/react/package.json
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release: v${{ steps.bump.outputs.version }}" \
            --body "Automated release PR bumping version to ${{ steps.bump.outputs.version }}.")
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Trigger CI on release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run CI --ref "${{ steps.pr.outputs.branch }}"

      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            RUN_ID=$(gh run list --workflow=CI --branch "${{ steps.pr.outputs.branch }}" --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "Found CI run $RUN_ID"
              gh run watch "$RUN_ID" --exit-status
              exit 0
            fi
            echo "Waiting for CI run to appear..."
            sleep 2
          done
          echo "CI run did not appear within 60s"
          exit 1

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.pr_url }}" --squash --delete-branch

      - run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish --workspace=packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --target main \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
